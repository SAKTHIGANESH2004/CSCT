services:
  - type: web
    name: classic-traders-bot
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: WA_TOKEN
        sync: false
      - key: PHONE_ID
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: CLIENT_PHONE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: classic-traders-db
          property: connectionString

databases:
  - name: classic-traders-db
    databaseName: classictraders
    user: classictraders
    region: singapore
    plan: free
